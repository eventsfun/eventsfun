<!DOCTYPE html>
<!-- EventsFun | Area Personale | v4.0 Supabase Auth -->
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>Area Personale — EventsFun</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0A;--bg2:#111;--bg3:#161616;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.07);--text:#F5F0E8;--text-muted:rgba(240,237,232,0.6);--text-dim:rgba(240,237,232,0.4);--gold:#C9A96E;--gold-dark:#8a6e3e;--green:#7ED99A;--red:#e08080;--inp-bg:rgba(255,255,255,0.07);--inp-border:rgba(255,255,255,0.12);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--bg2);border-bottom:1px solid var(--border)}
.nav-logo{font-family:"Syne",sans-serif;font-size:17px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.3px}
.nav-logo span{color:var(--gold)}
.nav-back{font-size:13px;color:var(--text-dim);text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--gold)}
.wrap{max-width:640px;margin:0 auto;padding:60px 20px 80px}
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-family:"Syne",sans-serif;font-size:32px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
.hero p{font-size:14px;color:var(--text-muted);line-height:1.7}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;margin-bottom:20px}
.login-icon{font-size:40px;text-align:center;margin-bottom:16px}
.card h2{font-family:"Syne",sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.card .card-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.field input{background:var(--inp-bg);border:1px solid var(--inp-border);border-radius:8px;padding:13px 15px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(201,169,110,0.5)}
.field input::placeholder{color:var(--text-dim)}
.btn-gold{width:100%;padding:14px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-gold:hover{opacity:.88}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.alert{border-radius:8px;padding:11px 15px;font-size:13px;margin-bottom:16px;display:none;line-height:1.6}
.alert-err{background:rgba(200,80,80,0.1);border:1px solid rgba(200,80,80,0.3);color:var(--red)}
.alert-ok{background:rgba(110,201,130,0.1);border:1px solid rgba(110,201,130,0.3);color:var(--green)}
.muted{font-size:12px;color:var(--text-dim);text-align:center;margin-top:18px;line-height:1.6}
.link-btn{background:none;border:none;color:var(--gold);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
.link-btn:hover{opacity:.8}
.plan-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.plan-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.plan-name{font-family:"Syne",sans-serif;font-size:18px;font-weight:700}
.plan-badge{font-size:10px;padding:4px 12px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.badge-base{background:rgba(120,160,200,0.12);color:#8ab4d8;border:1px solid rgba(120,160,200,0.25)}
.badge-pro{background:rgba(201,169,110,0.12);color:var(--gold);border:1px solid rgba(201,169,110,0.25)}
.badge-agenzia{background:rgba(168,130,201,0.12);color:#b89cd8;border:1px solid rgba(168,130,201,0.25)}
.plan-info{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:18px}
.plan-info strong{color:var(--text)}
.btn-dashboard{display:block;width:100%;padding:14px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .2s}
.btn-dashboard:hover{opacity:.88}
.status-line{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-gray{background:var(--text-dim)}.dot-gold{background:var(--gold)}
.upsell{background:linear-gradient(135deg,rgba(201,169,110,0.1),rgba(201,169,110,0.03));border:1px solid rgba(201,169,110,0.3);border-radius:14px;padding:28px;margin-top:20px;text-align:center}
.upsell h3{font-family:"Syne",sans-serif;font-size:19px;font-weight:700;margin-bottom:8px}
.upsell p{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:20px}
.pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.pkg{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:left;transition:border-color .2s}
.pkg:hover{border-color:rgba(201,169,110,0.4)}
.pkg-name{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.pkg-price{font-size:20px;font-weight:300;font-family:"Syne",sans-serif;color:var(--gold);margin-bottom:10px}
.pkg-price span{font-size:12px;color:var(--text-dim)}
.pkg a{display:block;padding:9px;border-radius:7px;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-size:12px;font-weight:700;text-align:center;text-decoration:none;transition:background .2s}
.pkg a:hover{background:rgba(201,169,110,0.2)}
.loading{text-align:center;padding:30px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar-user{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.topbar-user p{font-size:14px;color:var(--text-muted)}
@media(max-width:520px){.pkg-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="nav">
  <a href="https://eventsfun.com" class="nav-logo">Events<span>Fun</span></a>
  <a href="https://eventsfun.com" class="nav-back">← Torna al sito</a>
</nav>

<div class="wrap">
  <div class="hero">
    <h1>Area Personale</h1>
    <p>Accedi per gestire i tuoi eventi da qualsiasi dispositivo.</p>
  </div>

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <div class="login-icon">🔑</div>
    <h2>Accedi</h2>
    <p class="card-sub">Inserisci email e password del tuo account.</p>
    <div class="alert alert-err" id="loginAlert"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="latua@email.it">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwdInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-gold" id="loginBtn" onclick="doLogin()">Accedi →</button>
    <p class="muted">
      <button class="link-btn" onclick="forgotPwd()">Password dimenticata?</button>
      &nbsp;·&nbsp;
      Non hai un account? <a href="https://eventsfun.com/#prezzi" style="color:var(--gold)">Acquista</a>
    </p>
  </div>

  <div id="resultArea"></div>
</div>

<script>
var SB_URL = 'https://vousendridklswygvqpl.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdXNlbmRyaWRrbHN3eWd2cXBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTI1NDYsImV4cCI6MjA5NTM4ODU0Nn0.uuSWQ51epS1oiqSLC_GUeeroEzTiMbTAGe7rwMineoc';

function authH(){return {'apikey':SB_KEY,'Content-Type':'application/json'};}
function sbH(token){return {'apikey':SB_KEY,'Authorization':'Bearer '+(token||SB_KEY),'Content-Type':'application/json'};}

async function authLogin(email,pwd){
  var r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:authH(),body:JSON.stringify({email:email,password:pwd})});
  var data=await r.json();
  if(!r.ok)throw new Error(data.msg||data.error_description||data.error||'Credenziali non valide');
  return data;
}
async function authReset(email){
  var r=await fetch(SB_URL+'/auth/v1/recover',{method:'POST',headers:authH(),body:JSON.stringify({email:email,options:{redirectTo:'https://eventsfun.com/imposta-password.html'}})});
  if(!r.ok){var d=await r.json();throw new Error(d.msg||'Errore');}
  return true;
}
async function sbGet(table, filters, sel, token){
  var url=SB_URL+'/rest/v1/'+table+'?';
  if(sel)url+='select='+sel+'&';
  Object.entries(filters||{}).forEach(function(e){url+=e[0]+'=eq.'+encodeURIComponent(e[1])+'&';});
  var r=await fetch(url,{headers:sbH(token)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

var PAYMENT_LINKS={base:'https://buy.stripe.com/bJe6ozfIO0gE9EkcKE14400',pro:'https://buy.stripe.com/fZu28j7ci7J6bMs8uo14401',agenzia_mensile:'https://buy.stripe.com/3cIaEPbsye7ug2I7qk14402',agenzia_annuale:'https://buy.stripe.com/aFa6ozgMSfby8Agh0U14403'};
var DASH_FILE={base:'base-dashboard.html',pro:'pro-dashboard.html',agenzia:'agenzia-dashboard.html'};
var PLAN_LABEL={base:'Base',pro:'Pro',agenzia:'Agenzia'};
var currentEmail='',accessToken='';

function isClosed(ev){if(!ev||!ev.data_iso)return false;var t=new Date();t.setHours(0,0,0,0);var d=new Date(ev.data_iso);d.setHours(0,0,0,0);d.setDate(d.getDate()+1);return t>=d;}
function isoToIt(iso){if(!iso)return '';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

function showAlert(msg,type){var a=document.getElementById('loginAlert');a.className='alert alert-'+(type||'err');a.textContent=(type==='ok'?'':'⚠️ ')+msg;a.style.display='block';}
function hideAlert(){document.getElementById('loginAlert').style.display='none';}

async function doLogin(){
  var email=(document.getElementById('emailInput').value||'').trim().toLowerCase();
  var pwd=document.getElementById('pwdInput').value;
  hideAlert();
  if(!email||!email.includes('@')){showAlert('Inserisci un\'email valida.');return;}
  if(!pwd){showAlert('Inserisci la password.');return;}
  var btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Accesso...';
  try{
    var data=await authLogin(email,pwd);
    accessToken=data.access_token;currentEmail=email;
    sessionStorage.setItem('ef_at',accessToken);
    sessionStorage.setItem('ef_email',email);
    document.getElementById('loginCard').style.display='none';
    await loadDashboards();
  }catch(e){
    btn.disabled=false;btn.textContent='Accedi →';
    var m=(e.message||'').toLowerCase();
    if(m.includes('not confirmed')){showAlert('Devi prima impostare la password dal link ricevuto via email.');}
    else{showAlert('Email o password non corretti.');}
  }
}

async function forgotPwd(){
  var email=(document.getElementById('emailInput').value||'').trim().toLowerCase();
  if(!email||!email.includes('@')){showAlert('Inserisci prima la tua email, poi clicca "Password dimenticata".');return;}
  try{
    await authReset(email);
    showAlert('Ti abbiamo inviato un\'email per reimpostare la password.','ok');
  }catch(e){showAlert('Errore nell\'invio. Riprova.');}
}

async function loadDashboards(){
  var area=document.getElementById('resultArea');
  area.innerHTML='<div class="card"><div class="loading"><div class="spinner"></div><p style="font-size:13px;color:var(--text-muted)">Carico le tue dashboard...</p></div></div>';
  try{
    var orders=await sbGet('orders',{email:currentEmail},'id,piano,nome,created_at',accessToken);
    if(!orders||!orders.length){
      area.innerHTML='<div class="card"><p style="text-align:center;color:var(--text-muted);font-size:14px">Nessun acquisto trovato con questa email.</p><div style="text-align:center;margin-top:14px"><button class="link-btn" onclick="doLogout()">Esci</button></div></div>';
      return;
    }
    var html='<div class="topbar-user"><p>Bentornato'+(orders[0].nome?', <strong style="color:var(--text)">'+orders[0].nome+'</strong>':'')+'</p><button class="link-btn" onclick="doLogout()">Esci</button></div>';
    var anyActive=false;
    for(var i=0;i<orders.length;i++){
      var order=orders[i];var piano=order.piano||'base';var token=null,ev=null;
      try{var acts=await sbGet('activations',{order_id:order.id},'token',accessToken);if(acts&&acts.length)token=acts[0].token;}catch(e){}
      if(token){try{var evs=await sbGet('events',{activation_token:token},'nome,data_iso,attivo',accessToken);if(evs&&evs.length)ev=evs[0];}catch(e){}}
      var dashUrl=token?(DASH_FILE[piano]+'?token='+token):null;
      var closed=ev?isClosed(ev):false;var statusHtml,infoHtml,actionHtml;
      if(!token){
        statusHtml='<div class="status-line"><span class="dot dot-gray"></span><span style="color:var(--text-dim)">Attivazione in corso</span></div>';
        infoHtml='<div class="plan-info">Acquisto registrato. Ricarica tra poco.</div>';actionHtml='';
      }else if(!ev){
        anyActive=true;
        statusHtml='<div class="status-line"><span class="dot dot-gold"></span><span style="color:var(--gold)">Pronto per il primo evento</span></div>';
        infoHtml='<div class="plan-info">Accedi alla dashboard e crea il tuo evento.</div>';
        actionHtml='<a href="'+dashUrl+'" class="btn-dashboard">Accedi alla Dashboard '+PLAN_LABEL[piano]+' →</a>';
      }else if(closed){
        statusHtml='<div class="status-line"><span class="dot dot-gray"></span><span style="color:var(--text-dim)">Evento concluso</span></div>';
        infoHtml='<div class="plan-info">Evento <strong>'+ev.nome+'</strong> del '+isoToIt(ev.data_iso)+' concluso.</div>';
        actionHtml='<a href="'+dashUrl+'" class="btn-dashboard" style="background:var(--inp-bg);color:var(--text);border:1px solid var(--border)">Rivedi i dati →</a>';
      }else{
        anyActive=true;
        statusHtml='<div class="status-line"><span class="dot dot-green"></span><span style="color:var(--green)">Evento attivo</span></div>';
        infoHtml='<div class="plan-info">Evento <strong>'+ev.nome+'</strong> del '+isoToIt(ev.data_iso)+'.</div>';
        actionHtml='<a href="'+dashUrl+'" class="btn-dashboard">Accedi alla Dashboard '+PLAN_LABEL[piano]+' →</a>';
      }
      html+='<div class="plan-card"><div class="plan-card-head"><span class="plan-name">Pacchetto '+PLAN_LABEL[piano]+'</span><span class="plan-badge badge-'+piano+'">'+piano.toUpperCase()+'</span></div>'+statusHtml+infoHtml+actionHtml+'</div>';
    }
    var hasSingleUse=orders.some(function(o){return o.piano==='base'||o.piano==='pro';});
    if(!anyActive&&hasSingleUse){html+=buildUpsell();}
    area.innerHTML=html;
  }catch(e){
    area.innerHTML='<div class="card"><p style="text-align:center;color:var(--red);font-size:14px">Errore nel caricamento. <button class="link-btn" onclick="loadDashboards()">Riprova</button></p></div>';
  }
}

function buildUpsell(){
  return '<div class="upsell"><h3>🎉 Organizza un nuovo evento</h3><p>Il tuo evento è concluso. Pronto per il prossimo?</p><div class="pkg-grid">'
    +'<div class="pkg"><div class="pkg-name">Evento Base</div><div class="pkg-price">€29</div><a href="'+PAYMENT_LINKS.base+'">Acquista</a></div>'
    +'<div class="pkg"><div class="pkg-name">Evento Pro</div><div class="pkg-price">€79</div><a href="'+PAYMENT_LINKS.pro+'">Acquista</a></div>'
    +'<div class="pkg"><div class="pkg-name">Agenzia mensile</div><div class="pkg-price">€69<span>/mese</span></div><a href="'+PAYMENT_LINKS.agenzia_mensile+'">Abbonati</a></div>'
    +'<div class="pkg"><div class="pkg-name">Agenzia annuale</div><div class="pkg-price">€588<span>/anno</span></div><a href="'+PAYMENT_LINKS.agenzia_annuale+'">Abbonati</a></div>'
    +'</div></div>';
}

function doLogout(){
  sessionStorage.removeItem('ef_at');sessionStorage.removeItem('ef_email');
  accessToken='';currentEmail='';
  document.getElementById('resultArea').innerHTML='';
  document.getElementById('emailInput').value='';document.getElementById('pwdInput').value='';
  document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Accedi →';
  document.getElementById('loginCard').style.display='block';
  hideAlert();
}

(function(){
  var at=sessionStorage.getItem('ef_at'),em=sessionStorage.getItem('ef_email');
  if(at&&em){accessToken=at;currentEmail=em;document.getElementById('loginCard').style.display='none';loadDashboards();}
})();
</script>
</body>
</html>
