<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Gestionale -- EventsFun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;
  --card:#121212;
  --card2:#171717;
  --gold:#C9A96E;
  --txt:rgb(245,240,232);
  --muted:rgba(245,240,232,0.75);
  --dim:rgba(245,240,232,0.6);
  --line:rgba(245,240,232,0.12);
  --ok:#4ADE80;
  --warn:#FBBF24;
  --bad:#F87171;
  --info:#7DD3FC;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'DM Sans',system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
a{color:var(--gold)}

/* ---------- LOGIN ---------- */
#loginView{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}
.login-box{
  width:100%;
  max-width:400px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:32px 24px;
}
.login-box h1{font-size:24px;margin-bottom:6px}
.login-box .sub{color:var(--dim);font-size:14px;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:500;
}
.field input{
  width:100%;
  background:#0d0d0d;
  border:1px solid var(--line);
  border-radius:10px;
  padding:13px 14px;
  color:var(--txt);
  font-family:inherit;
  font-size:16px;
}
.field input:focus{outline:none;border-color:var(--gold)}
.btn{
  display:inline-block;
  width:100%;
  background:var(--gold);
  color:#0A0A0A;
  border:none;
  border-radius:10px;
  padding:14px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
}
.btn:disabled{opacity:0.5;cursor:default}
.msg{
  margin-top:14px;
  padding:11px 13px;
  border-radius:9px;
  font-size:14px;
  display:none;
  line-height:1.45;
}
.msg.err{display:block;background:rgba(248,113,113,0.12);color:var(--bad);border:1px solid rgba(248,113,113,0.3)}
.msg.ok{display:block;background:rgba(74,222,128,0.12);color:var(--ok);border:1px solid rgba(74,222,128,0.3)}

/* ---------- APP ---------- */
#appView{display:none;padding-bottom:60px}
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.topbar .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
.topbar .brand span{color:var(--gold)}
.topbar .who{font-size:12px;color:var(--dim);margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.mini{
  background:transparent;
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:8px;
  padding:8px 11px;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
}
.mini:hover{border-color:var(--gold);color:var(--gold)}

.wrap{max-width:1000px;margin:0 auto;padding:16px}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:18px;
}
.stat{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 12px;
  text-align:center;
}
.stat .n{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--gold)}
.stat .l{font-size:11px;color:var(--dim);margin-top:3px;letter-spacing:0.3px}

.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:16px;
}
.tab-btn{
  background:var(--card);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:10px;
  padding:11px 8px;
  font-family:'Syne',sans-serif;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.tab-btn.on{background:var(--gold);color:#0A0A0A;border-color:var(--gold)}
.tab-btn .badge{
  background:rgba(248,113,113,0.9);
  color:#fff;
  border-radius:999px;
  font-size:10px;
  padding:1px 6px;
  font-family:'DM Sans',sans-serif;
  font-weight:700;
}
.tab-btn.on .badge{background:#0A0A0A;color:var(--gold)}

.ev-filtro{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ev-chip{
  background:var(--card);
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:999px;
  padding:8px 14px;
  font-family:'Syne',sans-serif;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.ev-chip:hover{border-color:rgba(201,169,110,0.5)}
.ev-chip.on{background:var(--gold);color:#0A0A0A;border-color:var(--gold)}
.ev-chip .cnt2{font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;opacity:0.75}

.searchbar{margin-bottom:14px}
.searchbar input{
  width:100%;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px 14px;
  color:var(--txt);
  font-family:inherit;
  font-size:15px;
}
.searchbar input:focus{outline:none;border-color:var(--gold)}

.item{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.item.clic{cursor:pointer}
.item.clic:hover{border-color:rgba(201,169,110,0.5)}
.item-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}
.item-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;word-break:break-word;line-height:1.3}
.item-sub{font-size:13px;color:var(--dim);margin-top:3px;word-break:break-word}

.pill{
  display:inline-block;
  border-radius:999px;
  padding:3px 10px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.4px;
  flex-shrink:0;
  white-space:nowrap;
}
.pill.base{background:rgba(125,211,252,0.15);color:var(--info);border:1px solid rgba(125,211,252,0.35)}
.pill.pro{background:rgba(201,169,110,0.15);color:var(--gold);border:1px solid rgba(201,169,110,0.4)}
.pill.agenzia{background:rgba(196,181,253,0.15);color:#C4B5FD;border:1px solid rgba(196,181,253,0.35)}
.pill.ok{background:rgba(74,222,128,0.14);color:var(--ok);border:1px solid rgba(74,222,128,0.32)}
.pill.warn{background:rgba(251,191,36,0.14);color:var(--warn);border:1px solid rgba(251,191,36,0.32)}
.pill.bad{background:rgba(248,113,113,0.14);color:var(--bad);border:1px solid rgba(248,113,113,0.32)}
.pill.neutral{background:rgba(245,240,232,0.08);color:var(--muted);border:1px solid var(--line)}

.rows{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
  margin:12px 0;
  padding:12px 0;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.row-k{font-size:11px;color:var(--dim);letter-spacing:0.3px}
.row-v{font-size:14px;color:var(--txt);margin-top:2px;font-weight:500;word-break:break-word}

.acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.act{
  flex:1 1 auto;
  min-width:140px;
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  border-radius:9px;
  padding:10px 12px;
  font-size:13px;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  display:inline-block;
}
.act.sec{border-color:var(--line);color:var(--muted)}
.act:hover{background:rgba(201,169,110,0.1)}

.tok{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:11px;
  color:var(--dim);
  word-break:break-all;
  background:#0d0d0d;
  border:1px solid var(--line);
  border-radius:6px;
  padding:6px 8px;
  margin-top:6px;
}

.empty{
  text-align:center;
  padding:40px 20px;
  color:var(--dim);
  font-size:14px;
}
.loading{text-align:center;padding:50px 20px;color:var(--muted)}

.note{
  background:rgba(251,191,36,0.08);
  border:1px solid rgba(251,191,36,0.25);
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
  margin-bottom:16px;
}
.note b{color:var(--warn)}

.sec-title{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:15px;
  margin:22px 0 10px;
  color:var(--txt);
  display:flex;
  align-items:center;
  gap:8px;
}
.sec-title .cnt{
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  color:var(--dim);
  font-weight:400;
}

/* ---------- SCHEDA CLIENTE ---------- */
.back{
  background:transparent;
  border:1px solid var(--line);
  color:var(--muted);
  border-radius:9px;
  padding:9px 14px;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
  margin-bottom:16px;
}
.back:hover{border-color:var(--gold);color:var(--gold)}

.scheda-hd{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 16px;
  margin-bottom:6px;
}
.scheda-hd h2{font-size:20px;word-break:break-word;line-height:1.25}
.scheda-hd .em{color:var(--muted);font-size:14px;margin-top:4px;word-break:break-word}
.scheda-hd .pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}

.dati{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:2px;
  background:var(--line);
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:6px;
}
.dato{background:var(--card);padding:12px 14px}
.dato .k{font-size:11px;color:var(--dim);letter-spacing:0.3px}
.dato .v{font-size:14px;margin-top:3px;font-weight:500;word-break:break-word}

.pag{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.pag .sx .t{font-weight:700;font-size:14px}
.pag .sx .d{font-size:12px;color:var(--dim);margin-top:2px}
.pag .dx{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:16px;
  color:var(--gold);
  white-space:nowrap;
}
.pag .dx.zero{color:var(--dim)}

.nota-box{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}
.nota-box textarea{
  width:100%;
  background:#0d0d0d;
  border:1px solid var(--line);
  border-radius:9px;
  padding:11px 12px;
  color:var(--txt);
  font-family:inherit;
  font-size:15px;
  resize:vertical;
  min-height:80px;
}
.nota-box textarea:focus{outline:none;border-color:var(--gold)}
.nota-box .sotto{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px}
.nota-box .cnt-car{font-size:12px;color:var(--dim)}
.btn-sm{
  background:var(--gold);
  color:#0A0A0A;
  border:none;
  border-radius:9px;
  padding:10px 18px;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
}
.btn-sm:disabled{opacity:0.5;cursor:default}

.attr-box{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}
.attr-row{display:flex;flex-wrap:wrap;gap:12px}
.attr-field{flex:1;min-width:180px;display:flex;flex-direction:column;gap:6px}
.attr-lab{font-size:11px;color:var(--dim);letter-spacing:0.3px;text-transform:uppercase}
.attr-box select{
  width:100%;
  background:#0d0d0d;
  border:1px solid var(--line);
  border-radius:9px;
  padding:11px 12px;
  color:var(--txt);
  font-family:inherit;
  font-size:15px;
}
.attr-box select:focus{outline:none;border-color:var(--gold)}
.attr-box .attr-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px}
.attr-hint{font-size:12px;color:var(--dim)}
.pill.vend{background:rgba(201,169,110,0.15);color:var(--gold);border:1px solid rgba(201,169,110,0.4)}
.attr-box input[type=text]{
  width:100%;
  background:#0d0d0d;
  border:1px solid var(--line);
  border-radius:9px;
  padding:11px 12px;
  color:var(--txt);
  font-family:inherit;
  font-size:15px;
  box-sizing:border-box;
}
.attr-box input[type=text]:focus{outline:none;border-color:var(--gold)}
.vend-riga{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.vend-riga.off{opacity:0.55}
.vend-nome{font-weight:600}
.vend-meta{font-size:12px;color:var(--dim);margin-top:2px}
.btn-sm.ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}
.btn-sm.ghost:hover{border-color:var(--gold);color:var(--gold)}
.vuoto{color:var(--dim);text-align:center;padding:24px}

.attr-box textarea{
  width:100%;background:#0d0d0d;border:1px solid var(--line);border-radius:9px;
  padding:11px 12px;color:var(--txt);font-family:inherit;font-size:15px;
  resize:vertical;min-height:150px;box-sizing:border-box;
}
.attr-box textarea:focus{outline:none;border-color:var(--gold)}
.attr-box input[type=email]{
  width:100%;background:#0d0d0d;border:1px solid var(--line);border-radius:9px;
  padding:11px 12px;color:var(--txt);font-family:inherit;font-size:15px;box-sizing:border-box;
}
.attr-box input[type=email]:focus{outline:none;border-color:var(--gold)}
.nl-check{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0d0d0d;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer}
.nl-check input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.nl-check .nl-lab{flex:1;font-size:14px}
.nl-check .nl-n{font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;color:var(--gold);min-width:22px;text-align:right}
.nl-consenso{display:flex;align-items:center;gap:10px;margin:6px 0 4px;font-size:13px;color:var(--muted);cursor:pointer}
.nl-consenso input{width:17px;height:17px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.nl-count{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;align-items:baseline;gap:8px;margin-top:8px}
.nl-count .n{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--gold)}
.nl-count .l{font-size:13px;color:var(--muted)}
.nl-lista{margin-top:10px}
.nl-lista-vuota{font-size:13px;color:var(--dim);padding:8px 2px}
.nl-lista-tit{font-size:11px;color:var(--dim);letter-spacing:0.3px;text-transform:uppercase;margin:4px 0 8px}
.nl-dest{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#0d0d0d;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
.nl-dest input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.nl-dest-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.nl-dest-nome{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nl-dest-mail{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nl-badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.nl-badge{font-size:10px;font-weight:700;letter-spacing:0.3px;color:var(--gold);background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.4);border-radius:6px;padding:2px 6px}
.nl-stor{background:#0d0d0d;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.nl-stor-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.nl-stor-ogg{font-weight:600;font-size:14px}
.nl-stor-data{font-size:12px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.nl-stor-meta{font-size:12px;color:var(--muted);margin-top:4px}
.nl-stor-det{margin-top:8px}
.nl-stor-det summary{font-size:12px;color:var(--gold);cursor:pointer}
.nl-stor-corpo{margin-top:8px;padding:10px 12px;background:var(--card2);border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--txt);white-space:pre-wrap;word-break:break-word}

.nota-riga{
  background:var(--card2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:8px;
}
.nota-riga .testo{font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.nota-riga .meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:8px;
  font-size:11px;
  color:var(--dim);
}
.del-nota{
  background:transparent;
  border:1px solid rgba(248,113,113,0.4);
  color:var(--bad);
  border-radius:7px;
  padding:4px 10px;
  font-size:11px;
  font-family:inherit;
  cursor:pointer;
  flex-shrink:0;
}
.del-nota:hover{background:rgba(248,113,113,0.12)}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .wrap{padding:14px 12px}
  .item{padding:14px}
  .act{min-width:100%}
  .pag{flex-direction:column;align-items:flex-start;gap:6px}
  .pag .dx{align-self:flex-end}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <div class="login-box">
    <h1>Gestionale <span style="color:#C9A96E">EventsFun</span></h1>
    <p class="sub">Area riservata. Accedi con le tue credenziali.</p>
    <div class="field">
      <label for="lg_email">Email</label>
      <input type="email" id="lg_email" autocomplete="username" inputmode="email" placeholder="tua@email.it">
    </div>
    <div class="field">
      <label for="lg_pw">Password</label>
      <input type="password" id="lg_pw" autocomplete="current-password" placeholder="La tua password">
    </div>
    <button class="btn" id="lg_btn">Accedi</button>
    <div class="msg" id="lg_msg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView">
  <div class="topbar">
    <div>
      <div class="brand">Gestionale <span>EventsFun</span></div>
      <div class="who" id="who"></div>
    </div>
    <div class="topbar-actions">
      <button class="mini" id="btnRefresh">Aggiorna</button>
      <button class="mini" id="btnLogout">Esci</button>
    </div>
  </div>

  <div class="wrap">
    <div id="loadingBox" class="loading">Caricamento dati...</div>

    <!-- ---- elenco ---- -->
    <div id="content" style="display:none">
      <div class="stats">
        <div class="stat"><div class="n" id="st_clienti">0</div><div class="l">CLIENTI</div></div>
        <div class="stat"><div class="n" id="st_eventi">0</div><div class="l">EVENTI</div></div>
        <div class="stat"><div class="n" id="st_iscritti">0</div><div class="l">ISCRITTI</div></div>

(function(){

  // ---------- utilita' ----------
  function $(id){ return document.getElementById(id); }

  function esc(s){
    if(s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Riservata: reintrodurre gli importi (INCASSATO, PAGATO, sezione Pagamenti)
  // quando ci saranno incassi reali. Al momento non e' richiamata.
  function euro(cent){
    var n = Number(cent || 0) / 100;
    return n.toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' euro';
  }

  function dataIt(iso){
    if(!iso) return '--';
    var p = String(iso).slice(0,10).split('-');
    if(p.length !== 3) return String(iso);
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function dataOraIt(iso){
    if(!iso) return '--';
    var d = new Date(iso);
    if(isNaN(d.getTime())) return dataIt(iso);
    var gg = String(d.getDate()).padStart(2,'0');
    var mm = String(d.getMonth()+1).padStart(2,'0');
    var hh = String(d.getHours()).padStart(2,'0');
    var mi = String(d.getMinutes()).padStart(2,'0');
    return gg + '/' + mm + '/' + d.getFullYear() + ' alle ' + hh + ':' + mi;
  }

  function oggiIso(){
    var d = new Date();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var g = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + m + '-' + g;
  }

    var p = String(piano || '').toLowerCase();
    var file = 'base-dashboard.html';
    if(p === 'pro') file = 'pro-dashboard.html';
    else if(p === 'agenzia') file = 'agenzia-dashboard.html';
    return file + '?token=' + encodeURIComponent(token);
  }

    if(!s) return '<span class="pill neutral">Stato non indicato</span>';
    return '<span class="pill neutral">' + esc(s) + '</span>';

  function statoEvento(ev){
    if(ev.bozza) return '<span class="pill warn">Bozza</span>';
    if(ev.data_iso && String(ev.data_iso) < oggiIso()) return '<span class="pill neutral">Concluso</span>';

  // 'bozza'     = evento in bozza (visibile solo nel filtro "Tutti")
  // 'attivo'    = tutto il resto (in corso / futuro e aperto)
  function categoriaEvento(ev){
    if(ev.bozza) return 'bozza';
    if(ev.data_iso && String(ev.data_iso) < oggiIso()) return 'terminato';
    if(ev.attivo === false) return 'terminato';
    return 'attivo';

        mostraMsg(msg, 'Email o password non corretti.', 'err');

  // ---------- chiamata al portiere ----------
  async function chiedi(azione, extra){
    var s = await sb.auth.getSession();
    var token = s && s.data && s.data.session ? s.data.session.access_token : null;
    if(!token) throw new Error('NO_SESSION');

    var payload = { action: azione };
    if(extra){
      for(var k in extra){
        if(Object.prototype.hasOwnProperty.call(extra, k)) payload[k] = extra[k];
      }
    }

    var r = await fetch(FN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(payload)
    });

    var j = null;
    try{ j = await r.json(); }catch(e){ j = null; }

    if(!r.ok){
      var err = new Error((j && j.error) ? j.error : ('Errore ' + r.status));
      err.status = r.status;
      throw err;
    }
    return j;
  }

  function gestisciErrore(e){
    if(e.status === 403){
      mostraMsg($('app_msg'), 'Questo account non e\' autorizzato ad accedere al gestionale.', 'err');
      return true;
    }
    if(e.status === 401 || e.message === 'NO_SESSION'){
      sb.auth.signOut().catch(function(){});
      $('appView').style.display = 'none';
      $('loginView').style.display = 'flex';
      $('lg_btn').disabled = false;
      $('lg_btn').textContent = 'Accedi';
      mostraMsg($('lg_msg'), 'Sessione scaduta. Accedi di nuovo.', 'err');
      return true;
    }
    return false;
  }

    var c = SCHEDA.cliente;

  async function salvaNota(){
    var txt = $('nota_txt');
    var msg = $('nota_msg');
    var testo = txt.value.trim();
    nascondiMsg(msg);

    if(!testo){
      mostraMsg(msg, 'Scrivi qualcosa prima di salvare.', 'err');
      return;
    }

    $('nota_btn').disabled = true;
    $('nota_btn').textContent = 'Salvataggio...';

    try{
      await chiedi('nota_aggiungi', { order_id: SCHEDA.cliente.id, testo: testo });
      await apriCliente(SCHEDA.cliente.id);
    }catch(e){
      $('nota_btn').disabled = false;
      $('nota_btn').textContent = 'Salva nota';
      if(!gestisciErrore(e)){
        mostraMsg(msg, 'Nota non salvata: ' + e.message, 'err');
      }
    }
  }

  async function salvaAttribuzione(){
    var msg = $('attr_msg');
    var btn = $('attr_btn');
    nascondiMsg(msg);

    var agent = $('attr_agent') ? $('attr_agent').value : '';
    var optEl = $('attr_option');

    var extra = { order_id: SCHEDA.cliente.id, sales_agent: agent };
    if(agent && optEl) extra.commission_option = optEl.value;

    btn.disabled = true;
    btn.textContent = 'Salvataggio...';

    try{
      await chiedi('attribuisci', extra);
      await apriCliente(SCHEDA.cliente.id);
    }catch(e){
      btn.disabled = false;
      btn.textContent = 'Salva attribuzione';
      if(!gestisciErrore(e)){
        mostraMsg(msg, 'Attribuzione non salvata: ' + e.message, 'err');
      }
    }
  }

  async function eliminaNota(id){
    if(!window.confirm('Eliminare questa nota? L\'operazione non si puo\' annullare.')) return;
    try{
      await chiedi('nota_elimina', { nota_id: id });
      await apriCliente(SCHEDA.cliente.id);
    }catch(e){
      if(!gestisciErrore(e)){
        mostraMsg($('app_msg'), 'Nota non eliminata: ' + e.message, 'err');
      }
    }
  }

  // ---------- tab ----------
  function apriTab(nome){
    TAB = nome;
    var btns = document.querySelectorAll('.tab-btn');
    for(var i=0;i<btns.length;i++){
      btns[i].classList.toggle('on', btns[i].getAttribute('data-tab') === nome);
    }
    $('tab_clienti').style.display   = (nome === 'clienti')   ? 'block' : 'none';
    $('tab_eventi').style.display    = (nome === 'eventi')    ? 'block' : 'none';

    $('tab_venditori').style.display = (nome === 'venditori') ? 'block' : 'none';
    $('tab_newsletter').style.display = (nome === 'newsletter') ? 'block' : 'none';
    $('searchWrap').style.display    = (nome === 'clienti' || nome === 'eventi') ? 'block' : 'none';

  async function aggiungiVenditore(){

    var btn = $('vend_add_btn');

      btn.textContent = 'Aggiungi';
      if(!gestisciErrore(e)){

  // ---------- newsletter interna UI ----------
  var NL_SEG = [
    { code: 'clienti_base',    label: 'Clienti Base' },
    { code: 'clienti_pro',     label: 'Clienti Pro' },
    { code: 'clienti_agenzia', label: 'Clienti Agenzia' },
    { code: 'venditori',       label: 'Venditori' }
  ];
  var nlSeq = 0;
  var nlDest = [];        // destinatari risolti: [{email, nome, segmenti}]
  var nlEsclusi = {};     // email escluse -> true (persistono tra i ricalcoli)

  function nlSegBreve(code){
    if(code === 'clienti_base') return 'Base';
    if(code === 'clienti_pro') return 'Pro';
    if(code === 'clienti_agenzia') return 'Agenzia';
    if(code === 'venditori') return 'Venditore';
    return code;
  }

    h += '<div class="attr-box">';

  function letturaSegmentiNl(){
    var out = [];
    var checks = document.querySelectorAll('#tab_newsletter .nl-seg');
    for(var i=0;i<checks.length;i++){ if(checks[i].checked) out.push(checks[i].value); }
    return out;
  }

  // Ricalcola il totale (destinatari non esclusi) e aggiorna il contatore.
  function aggiornaTotaleNl(){
    var n = 0;
    nlDest.forEach(function(d){ if(!nlEsclusi[d.email]) n++; });
    var tot = $('nl_tot');
    if(tot) tot.textContent = n;
  }

  // Disegna l'elenco nominativo dei destinatari con le spunte per escludere.
  function renderDestinatariNl(){
    var cont = $('nl_lista');
    if(!cont) return;
    if(nlDest.length === 0){
      cont.innerHTML = '<div class="nl-lista-vuota">Seleziona un gruppo per vedere chi ricevera la newsletter.</div>';
      aggiornaTotaleNl();
      return;
    }
    var h = '<div class="nl-lista-tit">Chi ricevera (togli la spunta per escludere)</div>';
    nlDest.forEach(function(d){
      var nome = d.nome || d.email;
      var badges = '';
      (d.segmenti || []).forEach(function(sc){ badges += '<span class="nl-badge">' + esc(nlSegBreve(sc)) + '</span>'; });
      var checked = nlEsclusi[d.email] ? '' : ' checked';
      h += '<label class="nl-dest">';
      h += '<input type="checkbox" class="nl-desti" data-email="' + esc(d.email) + '"' + checked + '>';
      h += '<span class="nl-dest-info"><span class="nl-dest-nome">' + esc(nome) + '</span><span class="nl-dest-mail">' + esc(d.email) + '</span></span>';
      h += '<span class="nl-badges">' + badges + '</span>';
      h += '</label>';
    });
    cont.innerHTML = h;

    var chks = cont.querySelectorAll('.nl-desti');
    for(var i=0;i<chks.length;i++){
      chks[i].addEventListener('change', function(){
        var em = this.getAttribute('data-email');
        if(this.checked){ delete nlEsclusi[em]; }
        else { nlEsclusi[em] = true; }
        aggiornaTotaleNl();
      });
    }
    aggiornaTotaleNl();
  }

  async function aggiornaListaNl(){
    var segmenti = letturaSegmentiNl();
    var soloConsenso = $('nl_consenso') ? $('nl_consenso').checked : false;
    var mySeq = ++nlSeq;
    try{
      var res = await chiedi('newsletter_lista', { segmenti: segmenti, solo_consenso: soloConsenso });
      if(mySeq !== nlSeq) return; // una risposta piu' recente ha gia' aggiornato la UI
      var per = res.per_segmento || {};
      NL_SEG.forEach(function(s){
        var el = $('nln_' + s.code);
        if(el) el.textContent = (per[s.code] != null ? per[s.code] : 0);
      });
      nlDest = res.destinatari || [];
      // mantieni le esclusioni solo per chi e' ancora presente nella lista
      var presenti = {};
      nlDest.forEach(function(d){ presenti[d.email] = true; });
      Object.keys(nlEsclusi).forEach(function(em){ if(!presenti[em]) delete nlEsclusi[em]; });
      renderDestinatariNl();
    }catch(e){
      if(mySeq !== nlSeq) return;
      if(!gestisciErrore(e)){
        NL_SEG.forEach(function(s){ var el = $('nln_' + s.code); if(el) el.textContent = '--'; });
        nlDest = [];
        renderDestinatariNl();
      }
    }
  }

  // Trasforma il testo semplice in HTML sicuro: escape, link cliccabili, a-capo.
  function nlTestoAHtml(txt){
    var e = esc(txt);
    e = e.replace(/(https?:\/\/[^\s<]+)/g, function(u){ return '<a href="' + u + '">' + u + '</a>'; });
    return e.replace(/\r\n|\r|\n/g, '<br>');
  }

  async function caricaStorico(){
    var cont = $('nl_storico');
    if(!cont) return;
    try{
      var res = await chiedi('newsletter_storico', {});
      var storico = res.storico || [];
      if(storico.length === 0){ cont.innerHTML = '<div class="vuoto">Nessun invio registrato.</div>'; return; }
      var h = '';
      storico.forEach(function(s){
        var segs = (s.segmenti || []).map(function(sc){ return nlSegBreve(sc); }).join(', ');
        var meta = (segs || 'nessun gruppo') + ' -- ' + (s.inviate || 0) + ' inviate su ' + (s.totale || 0);
        if(s.fallite){ meta += ', ' + s.fallite + ' non riuscite'; }
        if(s.esclusi){ meta += ', ' + s.esclusi + ' esclusi'; }
        h += '<div class="nl-stor">';
        h += '<div class="nl-stor-top"><div class="nl-stor-ogg">' + esc(s.oggetto || '(senza oggetto)') + '</div><div class="nl-stor-data">' + dataOraIt(s.created_at) + '</div></div>';
        h += '<div class="nl-stor-meta">' + esc(meta) + '</div>';
        if(s.corpo){
          h += '<details class="nl-stor-det"><summary>Vedi testo</summary><div class="nl-stor-corpo">' + esc(s.corpo) + '</div></details>';
        }
        h += '</div>';
      });
      cont.innerHTML = h;
    }catch(e){
      if(!gestisciErrore(e)){
        cont.innerHTML = '<div class="vuoto">Impossibile caricare lo storico.</div>';
      }
    }
  }

  async function inviaNewsletter(){
    var msg = $('nl_msg');
    nascondiMsg(msg);

    var segmenti = letturaSegmentiNl();
    var soloConsenso = $('nl_consenso') ? $('nl_consenso').checked : false;
    var oggetto = $('nl_oggetto') ? $('nl_oggetto').value.trim() : '';
    var fromName = $('nl_from') ? $('nl_from').value.trim() : '';
    var replyTo = $('nl_reply') ? $('nl_reply').value.trim() : '';
    var corpo = $('nl_corpo') ? $('nl_corpo').value.trim() : '';

    if(segmenti.length === 0){ mostraMsg(msg, 'Seleziona almeno un gruppo di destinatari.', 'err'); return; }
    if(!oggetto){ mostraMsg(msg, 'Inserisci l\'oggetto.', 'err'); return; }
    if(!corpo){ mostraMsg(msg, 'Scrivi il testo del messaggio.', 'err'); return; }

    var totTxt = $('nl_tot') ? $('nl_tot').textContent : '?';
    if(totTxt === '0'){ mostraMsg(msg, 'Nessun destinatario selezionato.', 'err'); return; }
    if(!window.confirm('Stai per inviare a ' + totTxt + ' destinatari. Procedere?')) return;

    var esclusi = Object.keys(nlEsclusi);

    var btn = $('nl_invia_btn');
    btn.disabled = true;
    btn.textContent = 'Invio in corso...';

    try{
      var res = await chiedi('newsletter_invia', {
        segmenti: segmenti,
        solo_consenso: soloConsenso,
        oggetto: oggetto,
        from_name: fromName,
        reply_to: replyTo,
        html: nlTestoAHtml(corpo),
        corpo: corpo,
        esclusi: esclusi
      });
      btn.disabled = false;
      btn.textContent = 'Invia newsletter';
      var inviate = res.inviate || 0;
      var fallite = res.fallite || 0;
      mostraMsg(msg, inviate + ' email inviate' + (fallite > 0 ? ', ' + fallite + ' non riuscite.' : '.'), fallite > 0 ? 'err' : 'ok');
      if(fallite === 0){
        if($('nl_oggetto')) $('nl_oggetto').value = '';
        if($('nl_corpo')) $('nl_corpo').value = '';
      }
      caricaStorico();
    }catch(e){
      btn.disabled = false;
      btn.textContent = 'Invia newsletter';
      if(!gestisciErrore(e)){
        mostraMsg(msg, 'Invio non riuscito: ' + e.message, 'err');
      }
    }
  }

  // ---------- eventi UI ----------
  document.addEventListener('DOMContentLoaded', function(){
    $('lg_btn').addEventListener('click', accedi);
    $('lg_pw').addEventListener('keydown', function(ev){ if(ev.key === 'Enter') accedi(); });
    $('lg_email').addEventListener('keydown', function(ev){ if(ev.key === 'Enter') $('lg_pw').focus(); });
    $('btnLogout').addEventListener('click', esci);
    $('btnRefresh').addEventListener('click', carica);
    $('btnBack').addEventListener('click', mostraElenco);

    var btns = document.querySelectorAll('.tab-btn');
    for(var i=0;i<btns.length;i++){
      btns[i].addEventListener('click', function(){
        apriTab(this.getAttribute('data-tab'));
      });
    }

    $('q').addEventListener('input', function(){
      if(!DATI) return;
      disegnaClienti();
      disegnaEventi();
    });

    // click su una card cliente -> apre la scheda
    $('tab_clienti').addEventListener('click', function(ev){
      var link = ev.target.closest('a[data-stop]');
      if(link) return;
      var card = ev.target.closest('[data-cliente]');
      if(!card) return;
      apriCliente(card.getAttribute('data-cliente'));
    });

    // click sui chip del filtro clienti (tutti / base / pro / agenzia)
    $('tab_clienti').addEventListener('click', function(ev){
      var chip = ev.target.closest('[data-fcli]');
      if(!chip) return;
      var val = chip.getAttribute('data-fcli');
      if(val === FILTRO_CLI) return;
      FILTRO_CLI = val;
      disegnaClienti();
    });

    // click sui chip del filtro eventi (attivi / terminati / tutti)
    $('tab_eventi').addEventListener('click', function(ev){
      var chip = ev.target.closest('[data-fev]');
      if(!chip) return;
      var val = chip.getAttribute('data-fev');
      if(val === FILTRO_EV) return;
      FILTRO_EV = val;
      disegnaEventi();
    });

    // sessione gia' attiva?
    sb.auth.getSession().then(function(s){
      if(s && s.data && s.data.session){
        avvia();
      }
    }).catch(function(){});
  });

})();
</script>
