<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#f4f3f0;color:#1a1a1a;min-height:100vh;padding:32px 16px 80px}
.wrap{max-width:520px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:28px 24px;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.ev-date{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:10px}
.ev-title{font-family:"Syne",sans-serif;font-size:clamp(18px,5vw,26px);font-weight:800;letter-spacing:-.5px;margin-bottom:8px;word-break:break-word;overflow-wrap:break-word;hyphens:auto}
.ev-loc{font-size:13px;color:#666;margin-bottom:12px;word-break:break-word;overflow-wrap:break-word}
.ev-desc{font-size:13px;color:#666;line-height:1.7;word-break:break-word;overflow-wrap:break-word}
.ev-img{width:100%;max-height:220px;object-fit:cover;display:block;border-radius:12px;margin-bottom:20px}
.cap-bar{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cap-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:8px}
.cap-track{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.cap-fill{height:100%;background:#C9A96E;border-radius:3px}
.form-title{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lp-fg{margin-bottom:16px}
.lp-lbl{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:6px}
.lp-inp{width:100%;padding:11px 14px;border:1.5px solid #e0ddd8;border-radius:9px;font-size:13px;color:#1a1a1a;background:#fafaf8;outline:none;font-family:inherit;transition:border-color .2s}
.lp-inp:focus{border-color:#C9A96E}
.lp-inp::placeholder{color:#bbb}
.lp-cnt{display:flex;align-items:center;gap:12px;margin-top:4px}
.lp-cb{width:32px;height:32px;border-radius:7px;border:1.5px solid #e0ddd8;background:#fafaf8;font-size:17px;cursor:pointer;font-family:inherit;transition:border-color .2s}
.lp-cb:hover{border-color:#C9A96E}
.lp-cnt-val{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;min-width:24px;text-align:center}
.lp-chk{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
.lp-nl{display:flex;align-items:center;gap:10px;font-size:13px;color:#888;cursor:pointer;margin-top:8px}
.submit-btn{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#C9A96E,#8a6e3e);color:#0A0A0A;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;transition:opacity .2s}
.submit-btn:hover{opacity:.87}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.closed-box{background:#f5e6e6;border:1px solid #e0a0a0;border-radius:10px;padding:14px;text-align:center;color:#a04040;font-size:13px;font-weight:600}
.spon-wrap{margin-top:32px;padding-top:28px;border-top:1px solid #e8e4de;text-align:center}
.spon-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;margin-bottom:18px}
.spon-list{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
.spon-item{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#f8f7f5;border:1px solid #e8e4de;border-radius:10px;text-decoration:none;color:#333;font-size:13px;font-weight:600;word-break:break-word;overflow-wrap:break-word}
.spon-logo{width:28px;height:28px;border-radius:5px;object-fit:contain}
.ef-footer{margin-top:32px;text-align:center}
.ef-badge{display:inline-flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none}
.ef-badge-inner{display:inline-flex;align-items:center;gap:8px;background:#0A0A0A;border-radius:10px;padding:10px 20px;transition:opacity .2s}
.ef-badge:hover .ef-badge-inner{opacity:.85}
.ef-name{font-family:"Syne",sans-serif;font-size:14px;font-weight:800;color:#F5F0E8;letter-spacing:-.3px}
.ef-name span{color:#C9A96E}
.ef-sub{font-size:11px;color:rgba(245,240,232,.45);border-left:1px solid rgba(255,255,255,.12);padding-left:8px;margin-left:4px}
.ef-cta{font-size:11px;color:#aaa;margin-top:2px}
/* SUCCESS */
.success-box{text-align:center;padding:40px 20px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-box h2{font-family:"Syne",sans-serif;font-size:24px;font-weight:800;margin-bottom:8px}
.success-box p{font-size:14px;color:#666;line-height:1.7;max-width:400px;margin:0 auto}
/* LOADING */
.loading{min-height:50vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #e0ddd8;border-top-color:#C9A96E;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{text-align:center;padding:48px 20px}
.err-box h2{font-family:"Syne",sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;color:#1a1a1a}
.err-box p{font-size:13px;color:#666;line-height:1.7}
.alert{background:#fef3cd;border:1px solid #fdd77e;border-radius:8px;padding:10px 14px;font-size:12px;color:#856404;margin-bottom:14px;display:none}
.lp-inp select{background:#fafaf8}
.lp-select{width:100%;padding:11px 14px;border:1.5px solid #e0ddd8;border-radius:9px;font-size:13px;color:#1a1a1a;background:#fafaf8;outline:none;font-family:inherit;transition:border-color .2s;appearance:auto}
.lp-select:focus{border-color:#C9A96E}
.lp-chk-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.lp-chk-item{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;cursor:pointer}
.lp-chk-item input[type=checkbox]{width:16px;height:16px;accent-color:#C9A96E;cursor:pointer;flex-shrink:0}
@media(max-width:400px){.lp-grid{grid-template-columns:1fr}}
@media(max-width:480px){
  body{padding:20px 12px 60px}
  .card{padding:20px 16px}
  .ev-title{letter-spacing:-.3px}
  .success-box{padding:32px 12px}
  .err-box{padding:36px 12px}
}
.gcal-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 18px;background:#fff;border:1.5px solid #e0ddd8;border-radius:10px;font-size:13px;font-weight:600;color:#333;text-decoration:none;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.gcal-btn:hover{border-color:#C9A96E;box-shadow:0 2px 8px rgba(201,169,110,.15)}
.gcal-btn svg{flex-shrink:0}
.gcal-wrap{margin-top:4px}
/* ACCOMPAGNATORI */
.acc-wrap{margin-top:4px}
.acc-sep{border:none;border-top:1.5px dashed #e0ddd8;margin:20px 0 16px}
.acc-title{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;color:#C9A96E;margin-bottom:14px;letter-spacing:-.2px}
.acc-block{animation:fadeInAcc .25s ease}
@keyframes fadeInAcc{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* ============================================================
   TEMA SCURO
   ============================================================ */

body.dark .card{background:#111;box-shadow:0 2px 16px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.07)}

body.dark .cap-row{color:rgba(245,240,232,.45)}
body.dark .form-title{color:#F5F0E8}
body.dark .lp-lbl{color:rgba(245,240,232,.4)}
body.dark .lp-inp{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#F5F0E8}
body.dark .lp-inp:focus{border-color:#C9A96E}
body.dark .lp-inp::placeholder{color:rgba(245,240,232,.25)}
body.dark .lp-select{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#F5F0E8}
body.dark .lp-select:focus{border-color:#C9A96E}
body.dark .lp-cb{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#F5F0E8}
body.dark .lp-cb:hover{border-color:#C9A96E}
body.dark .lp-nl{color:rgba(245,240,232,.45)}
body.dark .lp-chk-item{color:rgba(245,240,232,.7)}
body.dark .lp-cnt-val{color:#F5F0E8}
body.dark .alert{background:rgba(254,243,205,.08);border-color:rgba(253,215,126,.2);color:#fdd77e}
body.dark .spon-wrap{border-top-color:rgba(255,255,255,.08)}

body.dark .spon-item{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);color:rgba(245,240,232,.75)}
body.dark .closed-box{background:rgba(160,64,64,.12);border-color:rgba(160,64,64,.3);color:#e07070}

body.dark .err-box p{color:rgba(245,240,232,.55)}

body.dark .gcal-btn:hover{border-color:#C9A96E;box-shadow:0 2px 8px rgba(201,169,110,.15)}

body.dark .acc-title{color:#C9A96E}
</style>

<body>
<div class="wrap" id="app">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#888">Caricamento evento...</p>
  </div>
</div>

<script>
/* ============================================================
   SUPABASE CONFIG
   ============================================================ */
var SB_URL = 'https://vousendridklswygvqpl.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdXNlbmRyaWRrbHN3eWd2cXBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTI1NDYsImV4cCI6MjA5NTM4ODU0Nn0.uuSWQ51epS1oiqSLC_GUeeroEzTiMbTAGe7rwMineoc';

function sbH() { return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }; }
async function sbGet(table, filters, sel) {
  var url = SB_URL + '/rest/v1/' + table + '?';
  if (sel) url += 'select=' + sel + '&';
  Object.entries(filters || {}).forEach(function(e) { url += e[0] + '=eq.' + encodeURIComponent(e[1]) + '&'; });
  var r = await fetch(url, { headers: sbH() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, data) {
  var r = await fetch(SB_URL + '/rest/v1/' + table, {
    method: 'POST', headers: Object.assign({}, sbH(), { 'Prefer': 'return=representation' }), body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ============================================================
   STATE
   ============================================================ */
var ev = null;
var regs = [];
var adultiCount = 1;
var bambiniCount = 0;

/* Restituisce le forme della parola in base alla terminologia scelta per l'evento */
function termWords(t) {
  var W = {
    iscrizione:     { imp: 'Iscriviti',  inf: 'iscriverti',   n: 'iscrizione',     N: 'Iscrizione',     np: 'iscrizioni',     ppl: 'Iscritti' },
    prenotazione:   { imp: 'Prenota',    inf: 'prenotare',    n: 'prenotazione',   N: 'Prenotazione',   np: 'prenotazioni',   ppl: 'Persone' },
    partecipazione: { imp: 'Partecipa',  inf: 'partecipare',  n: 'partecipazione', N: 'Partecipazione', np: 'partecipazioni', ppl: 'Partecipanti' },
    registrazione:  { imp: 'Registrati', inf: 'registrarti',  n: 'registrazione',  N: 'Registrazione',  np: 'registrazioni',  ppl: 'Partecipanti' }
  };
  return W[t] || W.iscrizione;
}

function isoToIt(iso) { if (!iso) return '—'; var p = iso.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
function isClosed(ev) {
  if (!ev || !ev.data_iso) return false;
  var t = new Date(); t.setHours(0, 0, 0, 0);
  var d = new Date(ev.data_iso); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 1);
  return t >= d;
}

/* Costruisce link Google Calendar con dati evento */
function buildGCalLink(ev) {
  if (!ev || !ev.data_iso) return null;
  /* Data inizio: YYYYMMDD */
  var dateStr = ev.data_iso.replace(/-/g, '');
  var startDt, endDt;
  if (ev.ora) {
    /* Con orario: formato YYYYMMDDTHHmmss */
    var hm = ev.ora.replace(':', '');
    if (hm.length === 4) hm = hm + '00';
    startDt = dateStr + 'T' + hm;
    /* Durata default 2 ore */
    var startH = parseInt(ev.ora.split(':')[0], 10);
    var startM = parseInt(ev.ora.split(':')[1] || '0', 10);
    var endH = startH + 2; if (endH >= 24) endH = 23;
    endDt = dateStr + 'T' + (endH < 10 ? '0' + endH : '' + endH) + (startM < 10 ? '0' + startM : '' + startM) + '00';
  } else {
    /* Tutto il giorno */
    var nextDay = new Date(ev.data_iso);
    nextDay.setDate(nextDay.getDate() + 1);
    var nd = nextDay.toISOString().split('T')[0].replace(/-/g,'');
    startDt = dateStr;
    endDt = nd;
  }
  var params = new URLSearchParams({
    action: 'TEMPLATE',
    text: ev.nome,
    dates: startDt + '/' + endDt,
    details: (ev.descrizione || '') + '\n\n' + termWords(ev.terminologia).N + ' gestita con EventsFun -- eventsfun.com',
    location: ev.evento_online ? ('Evento online' + (ev.luogo ? ' - ' + ev.luogo : '')) : (ev.luogo || '')
  });
  return 'https://calendar.google.com/calendar/render?' + params.toString();
}

/* HTML del bottone Google Calendar */
function gcalBtnHtml(ev) {
  var link = buildGCalLink(ev);
  if (!link) return '';
  return '<div class="gcal-wrap"><a href="' + link + '" target="_blank" rel="noopener" class="gcal-btn">'
    + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="17" rx="2" stroke="#4285F4" stroke-width="2"/><path d="M3 9h18" stroke="#4285F4" stroke-width="2"/><path d="M8 2v4M16 2v4" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/><rect x="7" y="13" width="4" height="3" rx="0.5" fill="#4285F4"/></svg>'
    + 'Aggiungi a Google Calendar</a></div>';
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  var params = new URLSearchParams(window.location.search);
  var evSlug = params.get('slug');
  var evId = params.get('id');
  if (!evSlug && !evId) { showError('Link non valido', 'Questo link non contiene un evento valido.'); return; }
  try {
    /* Priorita' a slug; fallback su id per retrocompatibilita' con link vecchi */
    var evs;
    if (evSlug) {
      evs = await sbGet('events', { slug: evSlug }, '*');
    } else {
      evs = await sbGet('events', { id: evId }, '*');
    }
    if (!evs || !evs.length) { showError('Evento non trovato', 'L\'evento che stai cercando non esiste o è stato rimosso.'); return; }
    ev = evs[0];
    /* Il parametro ?tema= nell'URL ha la precedenza sul valore salvato su DB --
       permette all'anteprima di mostrare il tema scelto prima del salvataggio */
    var temaParam = new URLSearchParams(window.location.search).get('tema');
    var temaFinale = temaParam || ev.landing_tema || 'chiaro';
    if (temaFinale === 'scuro') document.body.classList.add('dark');
    regs = await sbGet('registrations', { event_id: ev.id }, 'id,adulti,bambini,in_lista_attesa');
    document.title = ev.nome + ' — EventsFun';
    render();
  } catch(e) {
    showError('Errore di caricamento', 'Non è stato possibile caricare l\'evento. Riprova tra qualche secondo.');
  }
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  var app = document.getElementById('app');
  var closed = isClosed(ev) || !ev.attivo;
  var cf = ev.custom_fields || [];
  var sponsors = ev.sponsors || [];
  var TW = termWords(ev.terminologia);
  document.title = TW.N + ' evento -- EventsFun';

  var imgHtml = ev.immagine ? '<img src="' + ev.immagine + '" class="ev-img" alt="' + ev.nome + '">' : '';

  var capHtml = '';
  if (ev.opt_capienza && ev.capienza) {
    var confermati = regs.filter(function(r) { return !r.in_lista_attesa; });
    var occupati = ev.opt_cap_persona && ev.opt_multipla
      ? confermati.reduce(function(a, r) { return a + (r.adulti || 1) + (r.bambini || 0); }, 0)
      : confermati.length;
    var posti = Math.max(0, ev.capienza - occupati);
    var pct = Math.round((occupati / ev.capienza) * 100);
    var postiLabel = posti === 0
      ? '<span style="color:#C9A96E;font-weight:700">Lista d\'attesa disponibile</span>'
      : '<span><strong>' + posti + '</strong> / ' + ev.capienza + '</span>';
    capHtml = '<div class="cap-bar"><div class="cap-row"><span>Posti disponibili</span>' + postiLabel + '</div><div class="cap-track"><div class="cap-fill" style="width:' + pct + '%"></div></div>'
      + (posti === 0 ? '<p style="font-size:11px;color:#999;margin-top:8px">L\'evento è al completo. Puoi comunque ' + TW.inf + ': verrai messo in lista d\'attesa.</p>' : '')
      + '</div>';
  }

  var extraFields = '';
  if (ev.opt_multipla) {
    var pplLbl = (ev.opt_bambini !== false) ? 'Adulti' : termWords(ev.terminologia).ppl;
    extraFields += '<div class="lp-fg"><label class="lp-lbl">' + pplLbl + ' *</label><div class="lp-cnt"><button type="button" class="lp-cb" onclick="changeCount(\'adulti\',-1)">−</button><div class="lp-cnt-val" id="cnt_adulti">1</div><button type="button" class="lp-cb" onclick="changeCount(\'adulti\',1)">+</button></div></div>';
    if (ev.opt_bambini !== false) {
      extraFields += '<div class="lp-fg"><label class="lp-lbl">Bambini</label><div class="lp-cnt"><button type="button" class="lp-cb" onclick="changeCount(\'bambini\',-1)">−</button><div class="lp-cnt-val" id="cnt_bambini">0</div><button type="button" class="lp-cb" onclick="changeCount(\'bambini\',1)">+</button></div></div>';
    }
    extraFields += '<div id="accompagnatori-wrap" class="acc-wrap"></div>';
  }
  if (ev.opt_tipo) {
    extraFields += '<div class="lp-fg"><label class="lp-lbl">Tipo iscritto *</label><select id="r_tipo" class="lp-inp"><option value="visitatore">Visitatore</option><option value="espositore">Espositore</option></select></div>';
  }
  if (ev.opt_pasto) {
    var pastoOpts = '';
    if (ev.opt_pasto_pranzo !== false) pastoOpts += '<label class="lp-chk"><input type="checkbox" id="r_pranzo" style="accent-color:#C9A96E"> Pranzo</label>';
    if (ev.opt_pasto_cena !== false) pastoOpts += '<label class="lp-chk"><input type="checkbox" id="r_cena" style="accent-color:#C9A96E"> Cena</label>';
    if (pastoOpts) extraFields += '<div class="lp-fg"><label class="lp-lbl">Vuoi prenotare il pasto?</label><div style="display:flex;gap:16px;margin-top:4px">' + pastoOpts + '</div></div>';
  }
  cf.forEach(function(f) {
    var lbl = '<label class="lp-lbl">' + f.label + (f.required ? ' *' : '') + '</label>';
    if (f.type === 'dropdown') {
      extraFields += '<div class="lp-fg">' + lbl
        + '<select id="rx_' + f.id + '" class="lp-select">'
        + '<option value="">-- Seleziona --</option>'
        + (f.options || []).map(function(o) { return '<option value="' + o + '">' + o + '</option>'; }).join('')
        + '</select></div>';
    } else if (f.type === 'checkbox') {
      extraFields += '<div class="lp-fg">' + lbl
        + '<div class="lp-chk-list" id="rxgrp_' + f.id + '">'
        + (f.options || []).map(function(o) {
          return '<label class="lp-chk-item"><input type="checkbox" id="rxcb_' + f.id + '_' + o.replace(/\s+/g,'_') + '" value="' + o + '" style="accent-color:#C9A96E"> ' + o + '</label>';
        }).join('')
        + '</div></div>';
    } else if (f.type === 'textarea') {
      extraFields += '<div class="lp-fg">' + lbl + '<textarea id="rx_' + f.id + '" class="lp-inp" placeholder="' + (f.placeholder || '') + '" rows="4" style="resize:vertical;font-family:inherit;font-size:14px;line-height:1.5;padding:10px 12px"></textarea></div>';
    } else {
      extraFields += '<div class="lp-fg">' + lbl + '<input id="rx_' + f.id + '" class="lp-inp" placeholder="' + (f.placeholder || '') + '"></div>';
    }
  });
  var nlHtml = ev.opt_newsletter !== false
    ? '<label class="lp-nl"><input type="checkbox" id="r_newsletter" style="accent-color:#C9A96E;width:15px;height:15px"> Acconsento a ricevere comunicazioni future</label>'
    : '';

  var gdprHtml = '<label class="lp-nl" style="margin-top:6px"><input type="checkbox" id="r_gdpr" style="accent-color:#C9A96E;width:15px;height:15px"> Ho letto e accetto l\'<a href="https://eventsfun.com/privacy.html" target="_blank" style="color:#C9A96E;text-decoration:underline">informativa sul trattamento dei dati personali</a> *</label>';

  var formHtml = closed
    ? '<div class="closed-box">⛔ Le ' + TW.np + ' per questo evento sono chiuse</div>'
    : '<h2 class="form-title">' + TW.imp + '</h2>'
      + '<div class="alert" id="formAlert"></div>'
      + '<div class="lp-grid">'
      + '<div class="lp-fg"><label class="lp-lbl">Nome *</label><input id="r_nome" class="lp-inp" placeholder="Mario"></div>'
      + '<div class="lp-fg"><label class="lp-lbl">Cognome *</label><input id="r_cognome" class="lp-inp" placeholder="Rossi"></div>'
      + '</div>'
      + '<div class="lp-grid">'
      + '<div class="lp-fg"><label class="lp-lbl">Email *</label><input id="r_email" class="lp-inp" type="email" placeholder="mario@email.it"></div>'
      + '<div class="lp-fg"><label class="lp-lbl">Telefono</label><input id="r_tel" class="lp-inp" placeholder="333 0000000"></div>'
      + '</div>'
      + extraFields
      + nlHtml
      + gdprHtml
      + '<button class="submit-btn" id="submitBtn" onclick="submitReg()">' + TW.imp + ' →</button>';

  var sponsorsHtml = '';
  if (sponsors.length) {
    sponsorsHtml = '<div class="spon-wrap"><div class="spon-title">Con il supporto di</div><div class="spon-list">'
      + sponsors.map(function(s) {
        return '<a href="' + (s.url || '#') + '" target="_blank" class="spon-item">'
          + (s.logo ? '<img src="' + s.logo + '" class="spon-logo">' : '')
          + '<span>' + s.nome + '</span></a>';
      }).join('')
      + '</div></div>';
  }

  app.innerHTML = '<div class="card">'
    + imgHtml
    + '<div class="ev-date">' + isoToIt(ev.data_iso) + (ev.ora ? ' &middot; ' + ev.ora : '') + '</div>'
    + '<h1 class="ev-title">' + ev.nome + '</h1>'
    + (ev.evento_online
        ? '<div class="ev-loc">💻 Evento online' + (ev.luogo ? ' &middot; ' + ev.luogo : '') + '</div>'
        : (ev.luogo ? '<div class="ev-loc">📍 ' + ev.luogo + '</div>' : ''))
    + (ev.descrizione ? '<p class="ev-desc">' + ev.descrizione + '</p>' : '')
    + '</div>'
    + capHtml
    + '<div class="card">' + formHtml + '</div>'
    + sponsorsHtml
    + '<div class="ef-footer"><a href="https://eventsfun.com" target="_blank" class="ef-badge"><div class="ef-badge-inner"><span class="ef-name">Events<span>Fun</span></span><span class="ef-sub">Gestito con EventsFun</span></div><div class="ef-cta">Vuoi organizzare il tuo evento? &rarr;</div></a></div>';
}

/* ============================================================
   COUNTER + ACCOMPAGNATORI
   ============================================================ */
function changeCount(field, delta) {
  if (field === 'adulti') {
    adultiCount = Math.max(1, adultiCount + delta);
    document.getElementById('cnt_adulti').textContent = adultiCount;
    updateAccompagnatoriForm();
  } else {
    bambiniCount = Math.max(0, bambiniCount + delta);
    document.getElementById('cnt_bambini').textContent = bambiniCount;
  }
}

function updateAccompagnatoriForm() {
  var wrap = document.getElementById('accompagnatori-wrap');
  if (!wrap) return;
  var num = adultiCount - 1;
  if (num <= 0) { wrap.innerHTML = ''; return; }

  var emailObb = ev.opt_accompagnatori_email_obbligatoria ? ' *' : '';
  var telObb = ev.opt_accompagnatori_telefono_obbligatorio ? ' *' : '';

  var html = '<hr class="acc-sep">';
  for (var i = 1; i <= num; i++) {
    html += '<div class="acc-block" id="acc-block-' + i + '">';
    html += '<div class="acc-title">Accompagnatore ' + i + '</div>';
    html += '<div class="lp-grid">';
    html += '<div class="lp-fg"><label class="lp-lbl">Nome *</label><input id="acc_' + i + '_nome" class="lp-inp" placeholder="Mario"></div>';
    html += '<div class="lp-fg"><label class="lp-lbl">Cognome *</label><input id="acc_' + i + '_cognome" class="lp-inp" placeholder="Rossi"></div>';
    html += '</div>';
    html += '<div class="lp-grid">';
    html += '<div class="lp-fg"><label class="lp-lbl">Email' + emailObb + '</label><input id="acc_' + i + '_email" class="lp-inp" type="email" placeholder="mario@email.it"></div>';
    html += '<div class="lp-fg"><label class="lp-lbl">Telefono' + telObb + '</label><input id="acc_' + i + '_tel" class="lp-inp" placeholder="333 0000000"></div>';
    html += '</div>';
    html += '</div>';
  }
  wrap.innerHTML = html;
}

/* ============================================================
   SUBMIT
   ============================================================ */
async function submitReg() {
  var nome = (document.getElementById('r_nome').value || '').trim();
  var cognome = (document.getElementById('r_cognome').value || '').trim();
  var email = (document.getElementById('r_email').value || '').trim();
  var gdpr = document.getElementById('r_gdpr').checked;

  if (!nome || !cognome || !email) { showAlert('Compila i campi obbligatori: Nome, Cognome ed Email.'); return; }
  if (!email.includes('@')) { showAlert('Inserisci un indirizzo email valido.'); return; }
  if (!gdpr) { showAlert('Devi accettare il trattamento dei dati per procedere.'); return; }

  /* Validazione accompagnatori */
  var numAcc = ev.opt_multipla ? adultiCount - 1 : 0;
  var accompagnatori = [];
  for (var i = 1; i <= numAcc; i++) {
    var accNome = (document.getElementById('acc_' + i + '_nome').value || '').trim();
    var accCognome = (document.getElementById('acc_' + i + '_cognome').value || '').trim();
    var accEmail = (document.getElementById('acc_' + i + '_email').value || '').trim();
    var accTel = (document.getElementById('acc_' + i + '_tel').value || '').trim();
    if (!accNome || !accCognome) { showAlert('Compila Nome e Cognome di tutti gli accompagnatori.'); return; }
    if (ev.opt_accompagnatori_email_obbligatoria && !accEmail) { showAlert('L\'email è obbligatoria per tutti gli accompagnatori.'); return; }
    if (accEmail && !accEmail.includes('@')) { showAlert('Inserisci un\'email valida per l\'accompagnatore ' + i + '.'); return; }
    if (ev.opt_accompagnatori_telefono_obbligatorio && !accTel) { showAlert('Il telefono è obbligatorio per tutti gli accompagnatori.'); return; }
    accompagnatori.push({ nome: accNome, cognome: accCognome, email: accEmail, telefono: accTel });
  }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Invio in corso...';

  var cf = ev.custom_fields || [], extra = {};
  cf.forEach(function(f) {
    if (f.type === 'checkbox') {
      var checked = [];
      (f.options || []).forEach(function(o) {
        var cb = document.getElementById('rxcb_' + f.id + '_' + o.replace(/\s+/g,'_'));
        if (cb && cb.checked) checked.push(o);
      });
      extra[f.id] = checked;
    } else {
      var el = document.getElementById('rx_' + f.id);
      if (el) extra[f.id] = el.value.trim();
    }
  });

  var rt = document.getElementById('r_tipo');
  var rp = document.getElementById('r_pranzo');
  var rc = document.getElementById('r_cena');
  var rn = document.getElementById('r_newsletter');

  /* Lista d'attesa: capienza piena = iscrizione salvata con flag in_lista_attesa */
  var postiOccupati = ev.opt_cap_persona && ev.opt_multipla
    ? regs.reduce(function(a, r) { return a + (r.adulti || 1) + (r.bambini || 0); }, 0)
    : regs.length;
  var capienzaPiena = ev.capienza && postiOccupati >= ev.capienza;

  var regData = {
    event_id: ev.id,
    nome: nome, cognome: cognome, email: email,
    telefono: (document.getElementById('r_tel').value || '').trim(),
    adulti: ev.opt_multipla ? adultiCount : 1,
    bambini: ev.opt_multipla ? bambiniCount : 0,
    tipo: rt ? rt.value : 'visitatore',
    pranzo: rp ? rp.checked : false,
    cena: rc ? rc.checked : false,
    newsletter: rn ? rn.checked : false,
    extra: extra,
    presente: false,
    in_lista_attesa: !!capienzaPiena
  };

  try {
    /* Salva iscrizione capogruppo */
    var newReg = await sbPost('registrations', regData);
    var regId = Array.isArray(newReg) ? (newReg[0] ? newReg[0].id : '') : (newReg ? newReg.id : '');
    if (!capienzaPiena) regs.push({ id: regId, adulti: regData.adulti, bambini: regData.bambini });

    /* Email conferma capogruppo (non bloccante) */
    if (regId) {
      fetch(SB_URL + '/functions/v1/send-reg-confirmation', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ registration_id: regId, event_id: ev.id, nome: nome, cognome: cognome, email: email, in_lista_attesa: !!capienzaPiena })
      }).catch(function(e) { console.warn('Email conferma capogruppo non inviata:', e); });
    }

    /* Salva accompagnatori e invia loro email individuale */
    for (var j = 0; j < accompagnatori.length; j++) {
      var acc = accompagnatori[j];
      var accData = {
        event_id: ev.id,
        nome: acc.nome, cognome: acc.cognome,
        email: acc.email || null,
        telefono: acc.telefono || null,
        adulti: 1, bambini: 0,
        tipo: rt ? rt.value : 'visitatore',
        pranzo: rp ? rp.checked : false,
        cena: rc ? rc.checked : false,
        newsletter: false,
        extra: {},
        presente: false,
        in_lista_attesa: !!capienzaPiena,
        capogruppo_id: regId || null
      };
      try {
        var accReg = await sbPost('registrations', accData);
        var accRegId = Array.isArray(accReg) ? (accReg[0] ? accReg[0].id : '') : (accReg ? accReg.id : '');
        /* Email individuale solo se l'accompagnatore ha un'email valida */
        if (accRegId && acc.email && acc.email.includes('@')) {
          fetch(SB_URL + '/functions/v1/send-reg-confirmation', {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ registration_id: accRegId, event_id: ev.id, nome: acc.nome, cognome: acc.cognome, email: acc.email, in_lista_attesa: !!capienzaPiena })
          }).catch(function(e) { console.warn('Email conferma accompagnatore non inviata:', e); });
        }
      } catch(accErr) {
        console.warn('Errore salvataggio accompagnatore ' + (j + 1) + ':', accErr);
      }
    }

    showSuccess(nome, !!capienzaPiena);
  } catch(e) {
    btn.disabled = false; btn.textContent = termWords(ev.terminologia).imp + ' →';
    showAlert('Si è verificato un errore. Riprova tra qualche secondo.');
  }
}

function showAlert(msg) {
  var a = document.getElementById('formAlert'); if (!a) return;
  a.textContent = '⚠️ ' + msg; a.style.display = 'block';
  setTimeout(function() { a.style.display = 'none'; }, 5000);
}

function showSuccess(nome, inAttesa) {
  var TW = termWords(ev.terminologia);
  var titoloTxt = inAttesa ? 'Sei in lista d\'attesa!' : 'Grazie, ' + nome + '!';
  var iconaTxt = inAttesa ? '⏳' : '🎉';
  var testoTxt = inAttesa
    ? 'La tua richiesta per <strong>' + ev.nome + '</strong> è stata ricevuta.<br>L\'evento è al completo, ma sei in lista d\'attesa: se si libera un posto ti contatteremo via email.'
    : 'La tua ' + TW.n + ' a <strong>' + ev.nome + '</strong> è confermata.<br>Riceverai una email di conferma a breve.<br>Ci vediamo il <strong>' + isoToIt(ev.data_iso) + '</strong>' + (ev.evento_online ? ' <strong>online</strong>' + (ev.luogo ? ' su <strong>' + ev.luogo + '</strong>' : '') : (ev.luogo ? ' a <strong>' + ev.luogo + '</strong>' : '')) + '.';
  var gcalSuccessHtml = !inAttesa ? '<div style="margin-top:20px;display:flex;justify-content:center">' + gcalBtnHtml(ev) + '</div>' : '';
  document.getElementById('app').innerHTML = '<div class="card"><div class="success-box">'
    + '<div class="success-icon">' + iconaTxt + '</div>'
    + '<h2>' + titoloTxt + '</h2>'
    + '<p>' + testoTxt + '</p>'
    + gcalSuccessHtml
    + '</div></div>'
    + '<div class="ef-footer"><a href="https://eventsfun.com" target="_blank" class="ef-badge"><div class="ef-badge-inner"><span class="ef-name">Events<span>Fun</span></span><span class="ef-sub">Gestito con EventsFun</span></div><div class="ef-cta">Vuoi organizzare il tuo evento? &rarr;</div></a></div>';
}

function showError(title, msg) {
  document.getElementById('app').innerHTML = '<div class="card"><div class="err-box">'
    + '<div style="font-size:48px;margin-bottom:16px">🔍</div>'
    + '<h2>' + title + '</h2>'
    + '<p>' + msg + '</p>'
    + '<p style="margin-top:16px"><a href="https://eventsfun.com" style="color:#C9A96E;font-weight:600">← Torna a EventsFun</a></p>'
    + '</div></div>';
}

/* START */
init();
</script>
